<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pelajaran | SMAN 1 Muncar</title>
    <style>
        /* --- CSS Styles --- */
        :root {
            --bg-dark: #050510;
            --primary: #6366f1;
            --accent: #06b6d4;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow-x: hidden; }

        /* Background Animasi */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
                     background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050510 100%); }

        /* Utility */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #clock { font-family: monospace; font-size: 1.1rem; color: var(--accent); }

        /* Hero */
        .hero { text-align: center; padding: 4rem 0; }
        .hero h1 { font-size: 4rem; line-height: 1; margin-bottom: 1rem; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 50px; background: rgba(99, 102, 241, 0.2); border: 1px solid var(--primary); margin-bottom: 1rem; font-size: 0.8rem; }

        /* Search */
        .search-box { width: 100%; max-width: 500px; margin: 2rem auto; padding: 1rem; border: none; border-radius: 50px; background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s; }
        .search-box:focus { box-shadow: 0 0 20px var(--primary); }

        /* Grid Kelas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card { padding: 1.5rem; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3); }

        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 700px; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }

        /* Footer & Stats */
        .stats { display: flex; justify-content: space-around; padding: 2rem; margin: 2rem 0; }
        footer { text-align: center; padding: 2rem; opacity: 0.6; }
    </style>
</head>
<body>

<div id="particles"></div>

<div class="container">
    <header>
        <div class="logo">SMAN 1 MUNCAR</div>
        <div id="clock"></div>
    </header>

    <section class="hero">
        <div class="badge">SMAN 1 Muncar • Tahun Ajaran 2026/2027</div>
        <h1>JADWAL<br>PELAJARAN</h1>
        <input type="text" id="search" class="search-box" placeholder="Cari kelas (contoh: X 1)..." onkeyup="filterKelas()">
    </section>

    <div class="grid" id="gridKelas">
        <!-- JS akan generate kartu di sini -->
    </div>

    <section class="stats glass">
        <div><h3>21</h3><p>Kelas</p></div>
        <div><h3>54</h3><p>Guru</p></div>
        <div><h3>756</h3><p>Siswa</p></div>
    </section>

    <footer>&copy; 2026 SMAN 1 Muncar | Made with ❤️ by Jimmi17</footer>
</div>

<!-- Modal -->
<div class="modal" id="modalJadwal">
    <div class="glass modal-content">
        <h2 id="modalTitle">Jadwal Kelas</h2>
        <table id="jadwalTable">
            <thead><tr><th>Hari</th><th>Mata Pelajaran</th></tr></thead>
            <tbody>
                <tr><td>Senin</td><td>Matematika, Biologi</td></tr>
                <tr><td>Selasa</td><td>Informatika, Fisika</td></tr>
                <tr><td>Rabu</td><td>Bahasa Inggris, Sejarah</td></tr>
            </tbody>
        </table>
        <button onclick="closeModal()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">Tutup</button>
    </div>
</div>

<script>
    // Data Kelas
    const classes = ['X 1','X 2','X 3','X 4','X 5','X 6','X 7','XI 1','XI 2','XI 3','XI 4','XI 5','XI 6','XI 7','XII 1','XII 2','XII 3','XII 4','XII 5','XII 6','XII 7'];

    // Render Kartu
    const grid = document.getElementById('gridKelas');
    classes.forEach(c => {
        grid.innerHTML += `<div class="card glass" onclick="showModal('${c}')"><h3>${c}</h3></div>`;
    });

    // Jam Realtime
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // Filter Kelas
    function filterKelas() {
        let val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    // Modal Logic
    function showModal(namaKelas) {
        document.getElementById('modalTitle').innerText = "Jadwal " + namaKelas;
        document.getElementById('modalJadwal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modalJadwal').style.display = 'none';
    }
</script>
</body>
</html>
